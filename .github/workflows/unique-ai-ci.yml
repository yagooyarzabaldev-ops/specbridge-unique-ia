name: Unique IA CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unique-ai-ci:
    name: unique-ai-ci
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Unique IA tests
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/test.ps1

      - name: Validate contracts
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-contracts.ps1

      - name: Validate contract scopes
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-contract-scopes.ps1

      - name: Validate final reports
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-final-reports.ps1

      - name: Validate audit packets
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-audit-packets.ps1

      - name: Validate ChatGPT audits
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-chatgpt-audits.ps1

      - name: Validate CI authority
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-standard-ci-authority.ps1

      - name: Run security gate
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/validate-security-gates.ps1

      - name: Whitespace check (pull request)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          git diff --check "$base" HEAD
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Whitespace check (push)
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          if ($before -match '^0+$') {
            Write-Output "First push to branch - skipping whitespace check."
            exit 0
          }
          git diff --check "$before" "${{ github.sha }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
