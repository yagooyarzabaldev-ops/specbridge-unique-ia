name: Foundation Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-foundation:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # specbridge-smoke.ps1 runs every validate-*.ps1 and test-*.ps1 script,
      # including all the validators that used to run as individual steps
      # here. Keeping only the smoke step removes duplicated work without
      # removing any gate. Change authorized by
      # .specbridge/policies/workflow-change-authorizations.json
      # (wf-auth-20260609-foundation-dedup).
      - name: Run SpecBridge smoke validation
        shell: pwsh
        run: ./scripts/specbridge-smoke.ps1
