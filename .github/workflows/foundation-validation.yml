name: Foundation Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-foundation:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run foundation validation
        shell: pwsh
        run: ./scripts/validate-foundation.ps1

      - name: Run contract validation
        shell: pwsh
        run: ./scripts/validate-contracts.ps1

      - name: Run schema validation
        shell: pwsh
        run: ./scripts/validate-schemas.ps1

      - name: Run SpecBridge smoke validation
        shell: pwsh
        run: ./scripts/specbridge-smoke.ps1
