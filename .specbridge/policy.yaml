version: 1

project:
  name: specbridge
  methodology: spec_driven_development
  default_mode: full_autopilot
  default_branch: main

execution:
  ask_before_ordinary_steps: false
  continue_until_complete_or_blocked: true
  fix_validation_failures_automatically: true
  require_execution_contract: true

security:
  protected_files:
    - .env
    - .env.*
    - '**/*.pem'
    - '**/*.key'
    - '**/*secret*'
    - 'secrets/**'
    - 'infra/prod/**'

  blocked_commands:
    - 'rm -rf *'
    - 'sudo *'
    - 'curl * | bash'
    - 'chmod -R *'
    - 'docker system prune *'

  stop_conditions:
    - secret_access_required
    - destructive_database_change
    - production_config_change
    - billing_change
    - auth_security_change
    - ci_cd_security_change
    - policy_conflict
    - impossible_acceptance_criteria

quality_gates:
  require_lint: true
  require_typecheck: true
  require_tests: true
  require_build: true
  require_policy_validation: true
  require_codex_review: true

# Merge authority clarification (2026-06-09):
# autonomous_merge_enabled below is constrained by
# .claude/rules/specbridge-autonomous-execution.md, which forbids agents
# from merging PRs themselves. In practice every merge is performed or
# explicitly authorized per-PR by the human operator. The flag means
# "merge does not require an additional review board", not
# "agents may merge unprompted". The minimum_conditions still apply
# to every merge regardless of who performs it.
merge:
  autonomous_merge_enabled: true
  minimum_conditions:
    - ci_passed
    - tests_passed
    - no_policy_violation
    - no_protected_files_changed
    - codex_review_passed

deployment:
  staging:
    automatic: false
  production:
    automatic: false

apply_mode:
  allowed_operations:
    - issue_create
    - pr_open
    - ci_wait
    - merge
    - issue_close
    - post_merge_memory
  blocked_paths:
    - .env
    - .env.*
    - .github/workflows/**
    - infra/prod/**
    - secrets/**

path_overrides:
  - path: .github/workflows/specbridge-intake.yml
    allowed_for_pr_type: ci_change
    requires:
      - risk_level_high
      - explicit_contract_line
      - review_gate_passed
    reason: specbridge-intake workflow is the ChatGPT entry point - maintained by SpecBridge itself under governed contracts

lifecycle_guard:
  merge_states:
    auto_merge_enabled: does_not_count_as_merged
    merge_completed: confirmed_via_gh_pr_view_state_MERGED
    already_merged: confirmed_merged_idempotent
  issue_close_requires: merge_completed
  post_merge_memory_requires: primary_pr_state_MERGED

pr_types:
  execution:
    branch_prefix: codex/
    description: "Main operator feature/fix PRs"
    can_touch_scripts: true
    requires_test: true
  memory_closure:
    branch_prefix: specbridge/memory-closure-
    description: "Automated post-merge memory closure"
    can_touch_scripts: false
    requires_test: false
  reconcile:
    branch_prefix: specbridge/reconcile-
    description: "Manual evidence reconciliation"
    can_touch_scripts: false
    requires_test: false

ci_wait:
  check_states:
    polling: [no_checks_yet, pending, in_progress, queued]
    terminal_pass: [checks_passed]
    terminal_fail: [checks_failed, timed_out]
  max_attempts: 20
  interval_seconds: 30

idempotence:
  issue_create:
    if_exists: verified_existing
  pr_open:
    if_exists: already_exists
  merge:
    if_done: already_merged
  issue_close:
    if_done: already_closed
  post_merge_memory:
    if_exists: verified_existing
